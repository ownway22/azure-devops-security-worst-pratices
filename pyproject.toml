[project]
name = "ghazdo-vuln-demo"
version = "0.1.0"
description = "GHAzDO Security Scanning Demo — intentionally vulnerable Flask app"
requires-python = ">=3.11"
dependencies = [
    # ── Runtime dependencies (all safe) ─────────────────────────────────────────
    # Intentionally vulnerable packages are declared in requirements-vuln-demo.txt
    # so that GHAzDO Dependency Scanning detects them without installing them here.
    "flask",
    "requests",
    # Pin transitive deps above their known-vulnerable ranges so the resolver
    # never lands on a flagged release when pulling in Flask/requests.
    "urllib3>=2.6.3",      # fixes decompression-bomb CVEs (CVE-2024-37891, CVE-2024-37895)
    "certifi>=2023.7.22",  # fixes e-Tugra root cert (CVE-2023-37920); requests allows older versions
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
