trigger:
  - main

pool:
  name: Default

steps:
  # ── 進階安全性：程式碼掃描 ─────────────────────────────────────────────────
  # 參考：https://learn.microsoft.com/azure/devops/repos/security/configure-github-advanced-security-features

  # 步驟 1：初始化 CodeQL — 必須在建置／測試步驟之前執行
  - task: AdvancedSecurity-Codeql-Init@1
    displayName: "[程式碼掃描] 初始化 CodeQL"
    inputs:
      languages: "python"
      enableAutomaticCodeQLInstall: true

  # ── 進階安全性：機密掃描 ───────────────────────────────────────────────────
  # 機密掃描不需要 Pipeline Task。
  # 當儲存庫設定中啟用「Secret Protection」後，每次 git push 時會自動觸發掃描。
  # 路徑：專案設定 → Repos → Advanced Security → Secret Protection
  # 掃描結果位置：Repos → Advanced Security → Secrets
  - script: |
      echo "##[section]機密掃描"
      echo "機密掃描由 git push 自動觸發，不需要 Pipeline Task。"
      echo "掃描結果：Azure DevOps → Repos → Advanced Security → Secrets"
    displayName: "[機密掃描] Push 時自動觸發（無需 Task）"

  # ── 進階安全性：程式碼掃描（分析）────────────────────────────────────────

  # 步驟 3：執行 CodeQL 分析並將結果上傳至 Advanced Security 頁面
  - task: AdvancedSecurity-Codeql-Analyze@1
    displayName: "[程式碼掃描] 執行分析並上傳 CodeQL 結果"

  # ── 發佈 SARIF 掃描結果到 Azure Artifacts ─────────────────────────────────

  # 步驟 3a：找到 CodeQL 產生的 SARIF 檔案並複製到 Staging 目錄
  - script: |
      find $(Agent.TempDirectory) -name "*.sarif" -exec cp {} $(Build.ArtifactStagingDirectory)/ \;
      ls -la $(Build.ArtifactStagingDirectory)/*.sarif 2>/dev/null || echo "未找到 SARIF 檔案"
    displayName: "複製 SARIF 檔案到 Staging 目錄"
    condition: always()

  # 步驟 3b：發佈 SARIF 檔案到 Azure Artifacts
  - task: PublishBuildArtifacts@1
    displayName: "發佈 SARIF 掃描結果到 Artifacts"
    inputs:
      pathToPublish: $(Build.ArtifactStagingDirectory)
      artifactName: "CodeQL-SARIF-Results"
    condition: always()

  # ── 程式碼覆蓋率 ───────────────────────────────────────────────────────────

  # 步驟 4：安裝執行環境與開發相依套件（含 pytest 與 pytest-cov）
  - script: |
      pip install uv
      export PATH="$HOME/.local/bin:$PATH"
      uv sync --extra dev
    displayName: "安裝相依套件（uv）"

  # ── 進階安全性：相依套件掃描 ───────────────────────────────────────────────
  # 步驟 5：比對 requirements.txt 與 GitHub Advisory Database（CVE／GHSA）
  # 放在 uv sync 之後執行，確保套件環境已就緒；
  # requirements.txt 是 Component Detection 最可靠的 Python 格式。
  - task: AdvancedSecurity-Dependency-Scanning@1
    displayName: "[相依套件掃描] 掃描 requirements.txt 中的已知漏洞（CVE）"

  # 步驟 5：執行 pytest 並輸出 Cobertura XML 格式的覆蓋率報告
  # pyproject.toml 的 pytest.ini_options 已設定 --cov=src 與 --cov-report=xml
  - script: |
      export PATH="$HOME/.local/bin:$PATH"
      uv run pytest --junitxml=test-results.xml
    displayName: "執行測試並收集覆蓋率（pytest-cov → coverage.xml）"
    continueOnError: true   # 即使測試失敗，仍繼續執行後續發佈步驟

  # 步驟 6：將測試結果發佈至 Tests 頁籤
  - task: PublishTestResults@2
    displayName: "發佈測試結果"
    inputs:
      testResultsFormat: "JUnit"
      testResultsFiles: "test-results.xml"
      failTaskOnFailedTests: false
    condition: always()

  # 步驟 7a：安裝 .NET SDK（PublishCodeCoverageResults@2 需要它來執行 ReportGenerator）
  - task: UseDotNet@2
    displayName: "安裝 .NET SDK（供覆蓋率報告轉換使用）"
    inputs:
      packageType: sdk
      version: "8.x"
    condition: always()

  # 步驟 7b：將程式碼覆蓋率結果發佈至 Code Coverage 頁籤
  # 使用 PublishCodeCoverageResults v2（支援 Cobertura 格式，並自動產生 HTML 報表）
  # 參考：https://learn.microsoft.com/azure/devops/pipelines/test/review-code-coverage-results
  - task: PublishCodeCoverageResults@2
    displayName: "發佈程式碼覆蓋率報告（Cobertura → HTML）"
    inputs:
      summaryFileLocation: "coverage.xml"   # 由 pytest-cov 產生的 Cobertura XML
    condition: always()
