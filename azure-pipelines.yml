trigger:
  - main

pool:
  name: Default

steps:
  # ── Advanced Security: Code Scanning ───────────────────────────────────────
  # Ref: https://learn.microsoft.com/azure/devops/repos/security/configure-github-advanced-security-features

  # Step 1: Initialize CodeQL — must run BEFORE the build/test steps
  - task: AdvancedSecurity-Codeql-Init@1
    displayName: "[Code Scanning] Initialize CodeQL"
    inputs:
      languages: "python"
      enableAutomaticCodeQLInstall: true

  # ── Advanced Security: Dependency Scanning ─────────────────────────────────

  # Step 2: Scan pyproject.toml against the GitHub Advisory Database (CVE/GHSA)
  # Requires 'Code Security' to be enabled in the repository settings.
  - task: AdvancedSecurity-Dependency-Scanning@1
    displayName: "[Dependency Scanning] Scan pyproject.toml for CVEs"

  # ── Advanced Security: Secret Scanning ────────────────────────────────────
  # Secret Scanning does NOT use a pipeline task.
  # It is triggered automatically on every git push when 'Secret Protection'
  # is enabled in the repository settings (Project Settings → Repos →
  # Advanced Security → Secret Protection).
  # Results appear in: Repos → Advanced Security → Secrets
  - script: |
      echo "##[section]Secret Scanning"
      echo "Secret Scanning is push-triggered and requires no pipeline task."
      echo "Results: Azure DevOps → Repos → Advanced Security → Secrets"
    displayName: "[Secret Scanning] Push-triggered (no task required)"

  # ── Advanced Security: Code Scanning (analyze) ─────────────────────────────

  # Step 3: Run CodeQL analysis and upload results to Advanced Security tab
  - task: AdvancedSecurity-Codeql-Analyze@1
    displayName: "[Code Scanning] Analyze and upload CodeQL results"

  # ── Code Coverage ──────────────────────────────────────────────────────────

  # Step 4: Install runtime + dev dependencies (includes pytest & pytest-cov)
  - script: |
      pip install uv
      uv sync --extra dev
    displayName: "Install dependencies (uv)"

  # Step 5: Run pytest with Cobertura XML coverage output
  # pytest.ini_options in pyproject.toml configures --cov=src and --cov-report=xml
  - script: |
      uv run pytest --junitxml=test-results.xml
    displayName: "Run tests with coverage (pytest-cov → coverage.xml)"
    continueOnError: true   # allow publish even if tests fail

  # Step 6: Publish test results to the Tests tab
  - task: PublishTestResults@2
    displayName: "Publish test results"
    inputs:
      testResultsFormat: "JUnit"
      testResultsFiles: "test-results.xml"
      failTaskOnFailedTests: false
    condition: always()

  # Step 7: Publish code coverage results to the Code Coverage tab
  # Uses PublishCodeCoverageResults v2 (supports Cobertura + HTML report generation)
  # Ref: https://learn.microsoft.com/azure/devops/pipelines/test/review-code-coverage-results
  - task: PublishCodeCoverageResults@2
    displayName: "Publish code coverage (Cobertura → HTML)"
    inputs:
      summaryFileLocation: "coverage.xml"   # Cobertura XML produced by pytest-cov
    condition: always()
